# 生产部署：使用 GHCR 预构建镜像
#
# === 使用方式 ===
#
# 方式一：deploy.sh 脚本（推荐）
#   ./deploy.sh --setup              # 首次：创建目录 + 生成 .env
#   ./deploy.sh --prod v1.17.0       # 部署指定版本
#
# 方式二：手动
#   export VERSION=v1.17.0
#   docker login ghcr.io -u USERNAME
#   docker compose -f docker-compose.prod.yml up -d
#
# === 数据库持久化 ===
# 具名卷 db_data 挂载到 /app/data，SQLite 文件 data.db 位于卷内。
# 容器重建、镜像更新均不会清空数据库。备份见 deploy.sh --backup。

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-zjw2000926}/xunihuanzhe-backend:${VERSION:-latest}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - db_data:/app/data          # 具名卷 — 数据永久保存
      - ./cases:/app/cases:ro      # 病例文件只读
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///data/data.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-zjw2000926}/xunihuanzhe-frontend:${VERSION:-latest}
    ports:
      - "9000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
